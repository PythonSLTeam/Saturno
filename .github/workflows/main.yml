name: Saturno GitHub Workflow

# O fluxo será acionado em qualquer push ou pull request direcionado à branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do repositório para a máquina virtual do GitHub
    - name: Checkout do Código
      uses: actions/checkout@v4

    # 2. Configura o ambiente Python (usando a versão estável 3.10)
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Instala o Saturno como uma biblioteca local editável
    # O comando aponta exatamente para a pasta python/saturnolang onde está o seu setup.py
    - name: Instalar Biblioteca Saturno
      run: |
        python -m pip install --upgrade pip
        pip install -e python/saturnolang

    # 4. Executa um script de teste para garantir que o motor (saturnolang.py) está funcionando
    - name: Validar Interpretador Saturno
      run: |
        python -s -c "
        import sys
        # Garante que o Python encontre a pasta da library durante o teste
        sys.path.insert(0, './python/library')
        
        try:
            import saturnolang
            print('-> Biblioteca saturnolang importada com sucesso!')
            
            # Inicializa o motor do Saturno
            engine = saturnolang.SaturnoEngine()
            
            # Código de teste em Saturno
            codigo_teste = '''
            # Teste Automatizado
            definir base = 20
            definir altura = 5
            definir area = base * altura
            orbitar area
            '''
            
            # Executa capturando a saída
            resultado = engine.executar(codigo_teste, capturar_saida=True)
            
            # Verifica se o resultado da área foi calculado corretamente (20 * 5 = 100)
            if resultado == ['100']:
                print('-> Sucesso: O motor do Saturno processou a matemática e o comando orbitar corretamente!')
            else:
                print(f'-> Erro: Saída inesperada do motor. Esperado: [\"100\"], Recebido: {resultado}')
                sys.exit(1)
                
        except Exception as e:
            print(f'-> Erro crítico ao rodar o Workflow do Saturno: {e}')
            sys.exit(1)
        "
